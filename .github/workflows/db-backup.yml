name: Database Backup to R2 (1panel Style)

on:
  schedule:
    # 每 6 小时执行一次 (UTC 0, 6, 12, 18)
    - cron: '0 */6 * * *'
  workflow_dispatch: # 允许手动触发测试

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL 17 Client
        run: |
          # 添加 PostgreSQL 官方仓库以获取最新版本 (17)
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          echo "deb http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Create Backup and Upload to R2
        env:
          # Vercel Postgres 直连 URL
          DATABASE_URL: ${{ secrets.POSTGRES_URL_NON_POOLING }}
          # Cloudflare R2 认证
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          # 指定 Bucket 名称为 1panel
          R2_BUCKET: "1panel"
        run: |
          # 获取当前月份作为文件夹名 (例如 2026-04)
          YEAR_MONTH=$(date +"%Y-%m")
          # 获取具体时间作为文件名 (例如 2026-04-05_14-30-00)
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          FILENAME="db_backup_${TIMESTAMP}.sql"
          
          # 定义 R2 上的完整路径: database/YYYY-MM/filename.sql
          UPLOAD_PATH="database/${YEAR_MONTH}/${FILENAME}"
          
          echo "Starting database dump for $FILENAME using pg_dump 17..."
          # 明确使用 pg_dump 17 的路径
          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" --clean --if-exists > dump.sql
          
          echo "Uploading to R2 bucket '$R2_BUCKET' at path '$UPLOAD_PATH'..."
          # 使用 aws-cli 上传
          aws s3 cp dump.sql "s3://${R2_BUCKET}/${UPLOAD_PATH}" --endpoint-url $R2_ENDPOINT --region auto
          
          echo "✅ Backup successfully stored at: ${R2_BUCKET}/${UPLOAD_PATH}"
